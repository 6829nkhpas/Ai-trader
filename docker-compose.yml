version: '3.8'

services:
  questdb:
    image: questdb/questdb
    ports:
      - '9000:9000'
      - '8812:8812'
      - '9009:9009'

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

  redpanda:
    image: redpandadata/redpanda:latest
    command: redpanda start --smp 1 --memory 1G --reserve-memory 0M --overprovisioned --node-id 0 --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:19092 --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
    ports:
      - '19092:19092'
